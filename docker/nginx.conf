server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml application/xml+rss image/svg+xml;

    # 캐싱: 해시 붙은 정적 자산은 영구 캐싱
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 히스토리 모드: 매칭 안 되면 index.html로 폴백
    location / {
        try_files $uri $uri/ /index.html;
    }

    # index.html은 캐싱하지 않음 (배포 즉시 반영)
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }
}
